{% extends "base.html" %}

{% block title %}Admin Login - Tamil Nadu Tourist Guide{% endblock %}

{% block content %}
<div class="container py-5 d-flex justify-content-center align-items-center" style="min-height: calc(100vh - 280px);" id="adminLoginPageContainer">
    <div class="col-lg-5 col-md-8 col-sm-10">
        <div class="glass-card p-4 p-md-5" id="adminLoginCard">
            <h1 class="heading-serif mb-4 text-center text-white" id="adminLoginHeadline">Admin Gateway</h1>
            
            <form method="POST" action="{{ url_for('admin_login') }}" id="adminLoginForm">
                <div class="mb-4">
                    <label for="usernameInput" class="form-label text-muted" style="font-size: 0.85rem; text-transform: uppercase;">Username</label>
                    <input type="text" class="form-control form-input-premium w-100" id="usernameInput" name="username" placeholder="Enter admin username" required autofocus>
                </div>
                
                <div class="mb-4">
                    <label for="passwordInput" class="form-label text-muted" style="font-size: 0.85rem; text-transform: uppercase;">Password</label>
                    <input type="password" class="form-control form-input-premium w-100" id="passwordInput" name="password" placeholder="Enter admin password" required>
                </div>
                
                <button type="submit" class="btn-premium w-100 py-3 mt-2" id="adminLoginSubmitBtn">
                    <i class="bi bi-box-arrow-in-right"></i> Authenticate
                </button>
            </form>
            
            <div class="mt-4 text-center" style="font-size: 0.88rem; color: var(--text-muted);" id="defaultCredentialsNotice">
                <span>Default Username: <strong>admin</strong> | Password: <strong>admin123</strong></span>
            </div>
        </div>
    </div>
</div>
{% endblock %}
