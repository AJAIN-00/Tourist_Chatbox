services:
  - type: web
    name: tamilnadu-tourist-guide
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENWEATHERMAP_API_KEY
        sync: false
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: LIBRETRANSLATE_URL
        sync: false
      - key: LIBRETRANSLATE_KEY
        sync: false
